<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Product | Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/add-product.css" />
  <link rel="stylesheet" href="../assets/css/footer.css" />
  <link rel="stylesheet" href="../assets/css/admin-header.css" />
</head>
<body>
  <div id="header-placeholder"></div>

  <section class="add-product-hero">
    <img
      src="../assets/images/table.avif"
      alt="Add Product Banner"
      class="add-product-hero__image"
    />
  </section>

  <main class="add-product-page">
    <div class="page-container">
      <div class="add-product-page__layout">
        <!-- Form section -->
        <section class="add-product-form-panel">
          <div class="add-product-form-panel__header">
            <h1 class="add-product-form-panel__title">Add Product</h1>
            <button class="add-product-form-panel__close-button" type="button">
              <i data-lucide="x" class="add-product-form-panel__close-icon"></i>
            </button>
          </div>

          <form class="add-product-form">
            <div class="add-product-form__group">
              <label class="add-product-form__label">Name</label>
              <input
                type="text"
                placeholder="Enter Name"
                class="add-product-form__input"
              />
            </div>

            <div class="add-product-form__two-column">
              <div class="add-product-form__group">
                <label class="add-product-form__label">Price ($)</label>
                <input
                  type="text"
                  placeholder="250 $"
                  class="add-product-form__input"
                />
              </div>

              <div class="add-product-form__group">
                <label class="add-product-form__label">Category</label>
                <select class="add-product-form__select">
                  <option>All Categories</option>
                </select>
              </div>
            </div>

            <div class="add-product-form__spec-layout">
              <div class="add-product-form__spec-fields">
                <div class="add-product-form__group">
                  <label class="add-product-form__label">Material</label>
                  <input
                    type="text"
                    placeholder="Wool"
                    class="add-product-form__input"
                  />
                </div>

                <div class="add-product-form__group">
                  <label class="add-product-form__label">Color</label>
                  <select class="add-product-form__select">
                    <option>Color</option>
                  </select>
                </div>
              </div>

              <div class="add-product-dimension-card">
                <label class="add-product-dimension-card__title">Dimension</label>

                <div class="add-product-dimension-card__row">
                  <span class="add-product-dimension-card__name">Length</span>
                  <input
                    type="text"
                    placeholder="50 cm"
                    class="add-product-dimension-card__input"
                  />
                </div>

                <div class="add-product-dimension-card__row">
                  <span class="add-product-dimension-card__name">Width</span>
                  <input
                    type="text"
                    placeholder="50 cm"
                    class="add-product-dimension-card__input"
                  />
                </div>

                <div class="add-product-dimension-card__row">
                  <span class="add-product-dimension-card__name">Height</span>
                  <input
                    type="text"
                    placeholder="50 cm"
                    class="add-product-dimension-card__input"
                  />
                </div>

                <div class="add-product-dimension-card__row">
                  <span class="add-product-dimension-card__name">Weight</span>
                  <input
                    type="text"
                    placeholder="80 kg"
                    class="add-product-dimension-card__input"
                  />
                </div>
              </div>
            </div>

            <div class="add-product-form__group">
              <label class="add-product-form__label">Image URL</label>
              <input
                type="text"
                placeholder="https://example.com/image.jpg"
                class="add-product-form__input add-product-form__image-url"
              />
            </div>

            <div class="add-product-form__group">
              <label class="add-product-form__label">Details</label>
              <textarea class="add-product-form__textarea add-product-form__textarea--small"></textarea>
            </div>

            <div class="add-product-form__group">
              <label class="add-product-form__label">Description</label>
              <textarea class="add-product-form__textarea add-product-form__textarea--large"></textarea>
            </div>

            <div class="add-product-form__feature-toggle">
              <div class="add-product-form__toggle-track">
                <div class="add-product-form__toggle-thumb"></div>
              </div>
              <span class="add-product-form__toggle-label">Featured Product</span>
            </div>

            <div class="add-product-form__action-grid">
              <button type="button" class="add-product-form__action-button add-product-form__action-button--primary">
                Add Product
              </button>
              <button type="button" class="add-product-form__action-button add-product-form__action-button--secondary">
                Save Draft
              </button>
              <button type="button" class="add-product-form__action-button add-product-form__action-button--primary">
                Update
              </button>
            </div>
          </form>
        </section>

        <!-- Preview section -->
        <section class="add-product-preview">
          <h2 class="add-product-preview__title">Product Preview</h2>

          <div class="add-product-preview__grid">
            <div class="add-product-preview__hero-image-wrap">
              <img
                src="../assets/images/best-seller/img5.avif"
                alt="Preview Hero"
                class="add-product-preview__image"
              />
            </div>

            <div class="add-product-preview__square-image-wrap">
              <img
                src="../assets/images/best-seller/img.avif"
                alt="Preview 1"
                class="add-product-preview__image"
              />
            </div>

            <div class="add-product-preview__square-image-wrap">
              <img
                src="../assets/images/best-seller/img1.avif"
                alt="Preview 2"
                class="add-product-preview__image"
              />
            </div>

            <div class="add-product-preview__portrait-image-wrap">
              <img
                src="../assets/images/best-seller/img3.avif"
                alt="Preview 3"
                class="add-product-preview__image"
              />
            </div>

            <div class="add-product-preview__stack">
              <div class="add-product-preview__stack-top">
                <img
                  src="../assets/images/best-seller/img4.avif"
                  alt="Preview 4"
                  class="add-product-preview__image"
                />
              </div>

              <div class="add-product-preview__stack-bottom">
                <img
                  src="../assets/images/best-seller/img5.avif"
                  alt="Preview 5"
                  class="add-product-preview__image"
                />
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
