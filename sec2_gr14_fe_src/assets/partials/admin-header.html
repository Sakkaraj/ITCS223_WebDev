<!--
  admin-header.html — BoonSonClon Administrative Dashboard Navigation
  Purpose: Provides a specialized navigation system for staff, including 
           site-wide analytics and product management shortcuts.
-->

<header class="admin-header">
  <div class="admin-header__bottom">
    <div class="admin-header__brand">
      <div class="admin-header__brand-mark">F</div>
      <span class="admin-header__brand-name">Furniture Store</span>
    </div>

    <nav class="admin-header__nav">
      <a href="../pages/home" data-page="home" class="nav-link admin-header__nav-link">Home</a>
      <a href="../pages/admin-panel" data-page="admin-panel" class="nav-link admin-header__nav-link">Admin Panel</a>
      <a href="../pages/add-product" data-page="add-product" class="nav-link admin-header__nav-link">Add Product</a>
      <a href="../pages/contact-us" data-page="contact" class="nav-link admin-header__nav-link">Contact Us</a>

      <div class="admin-header__mobile-only-actions">
        <div class="admin-header__mobile-divider"></div>
        <a href="../pages/sign-in" class="admin-header__mobile-action">
          <i data-lucide="user"></i>
          <span>Admin Profile</span>
        </a>
        <a href="../pages/advance-search" class="admin-header__mobile-action">
          <i data-lucide="search"></i>
          <span>Advanced Search</span>
        </a>
        <a href="../pages/home" class="admin-header__mobile-action">
          <i data-lucide="external-link"></i>
          <span>View Site</span>
        </a>
        <div class="admin-header__mobile-divider"></div>
        <button class="js-logout-btn admin-header__mobile-action" style="background:none; border:none; width:100%; text-align:left; cursor:pointer;">
          <i data-lucide="log-out" style="color:#ef4444;"></i>
          <span style="color:#ef4444;">Logout Admin</span>
        </button>
      </div>
    </nav>

    <div class="admin-header__actions">
      <a href="../pages/home" class="admin-header__action-link admin-header__action-link--desktop" title="Main Website">
        <i data-lucide="layout" class="admin-header__action-icon"></i>
      </a>

      <!-- Admin Identity Section -->
      <div class="admin-header__user-status">
        <div class="admin-header__user-info">
          <span class="admin-header__user-label">Admin</span>
          <span class="admin-header__user-name js-admin-name">Administrator</span>
        </div>
        <button class="js-logout-btn admin-header__logout-btn" title="Logout Admin">
          <i data-lucide="log-out"></i>
        </button>
      </div>
    </div>

    <button class="admin-header__burger" id="burgerToggle" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>
