<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop | Furniture Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/style.css" /><link rel="stylesheet" href="../assets/css/shop.css" />
  <link rel="stylesheet" href="../assets/css/footer.css" />
  <link rel="stylesheet" href="../assets/css/header.css" />
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="shop-page">
    <div class="page-container">
      <div class="shop-page__layout">
        <!-- Sidebar -->
        <aside class="shop-sidebar">
          <button class="shop-sidebar__close" id="sidebarClose">
            <i data-lucide="x"></i>
          </button>
          <section class="shop-filter-group">
            <h4 class="shop-filter-group__title">Filter by Price</h4>
            <input type="range" min="99" max="9999" class="shop-filter-group__range" />
            <div class="shop-filter-group__range-values">
              <span>$99</span>
              <span>$9,999</span>
            </div>
          </section>

          <section class="shop-filter-group">
            <h4 class="shop-filter-group__title">Categories</h4>
            <ul class="shop-filter-list" id="categoryFilterList">
              <!-- Categories will be loaded dynamically by shop.js -->
            </ul>
          </section>
          
          <section class="shop-filter-group">
            <h4 class="shop-filter-group__title">Filter by Color</h4>
            <ul class="shop-color-filter-list" id="colorFilterList">
              <!-- Colors will be loaded dynamically by shop.js -->
            </ul>
          </section>

          <section class="shop-filter-group">
            <h4 class="shop-filter-group__title">Sort By</h4>
            <select class="shop-products__sort">
              <option value="latest">Sort by latest</option>
              <option value="bestsellers">Best Sellers</option>
              <option value="price_asc">Price: Low to High</option>
              <option value="price_desc">Price: High to Low</option>
            </select>
          </section>
        </aside>
        <!-- Product Grid -->
        <section class="shop-products">
          <div class="shop-products__toolbar">
            <p class="shop-products__result-text">Showing 0 results</p>
            <button class="shop-products__filter-toggle" id="filterToggle">
              <i data-lucide="filter"></i>
              <span>Filter</span>
            </button>
          </div>
          <div class="shop-products__grid">
            <!-- Products will be dynamically loaded here by shop.js -->
          </div>
          <div class="shop-pagination"></div>
        </section>
      </div>
    </div>
  </main>

  <!-- Featured Products -->
  <section class="shop-featured">
    <div class="page-container">
      <div class="shop-featured__header">
        <h2 class="shop-featured__title">Featured Products</h2>
        <a href="shop" class="shop-featured__button">View all</a>
      </div>
      <div class="shop-featured__grid">
        <!-- Featured products will be dynamically loaded here by shop-featured.js -->
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="../assets/js/wishlist.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/animations.js"></script>
  <script src="../assets/js/shop.js"></script>
  <script src="../assets/js/shop-featured.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
