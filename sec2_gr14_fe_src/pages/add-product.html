<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Product | Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <link rel="stylesheet" href="../assets/css/style.css" /><link rel="stylesheet" href="../assets/css/add-product.css" />
  <link rel="stylesheet" href="../assets/css/footer.css" />
  <link rel="stylesheet" href="../assets/css/admin-header.css" />
</head>
<body>
  <div id="header-placeholder"></div>

  <section class="add-product-hero">
    <img
      src="../assets/images/table.avif"
      alt="Add Product Banner"
      class="add-product-hero__image"
    />
  </section>

  <main class="add-product-page">
    <div class="page-container">
      <div class="add-product-page__layout">
        <!-- Form section -->
        <section class="add-product-form-panel">
          <div class="add-product-form-panel__header">
            <h1 class="add-product-form-panel__title">Add Product</h1>
            <a href="admin-panel" class="add-product-form-panel__close-button">
              <i data-lucide="x" class="add-product-form-panel__close-icon"></i>
            </a>
          </div>

          <form class="add-product-form">
            <div class="add-product-form__group">
              <label class="add-product-form__label">Name</label>
              <input
                type="text"
                placeholder="Enter Name"
                class="add-product-form__input"
              />
            </div>

            <div class="add-product-form__two-column">
              <div class="add-product-form__group">
                <label class="add-product-form__label">Price ($)</label>
                <input
                  type="text"
                  placeholder="250 $"
                  class="add-product-form__input"
                />
              </div>

              <div class="add-product-form__group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                  <label class="add-product-form__label" style="margin-bottom: 0;">Category</label>
                  <button type="button" class="add-meta-btn" data-type="category" style="background:none; border:none; color:#7c3aed; cursor:pointer; display:flex; align-items:center; gap:4px; font-size:12px; font-weight:600;">
                    <i data-lucide="plus-circle" style="width:14px; height:14px;"></i> Add
                  </button>
                </div>
                <select class="add-product-form__category-select">
                  <option value="">— Select Category —</option>
                </select>
              </div>
            </div>

            <div class="add-product-form__two-column">
              <div class="add-product-form__group">
                <label class="add-product-form__label">Quantity Left</label>
                <input
                  type="number"
                  placeholder="100"
                  class="add-product-form__input add-product-form__quantity"
                  min="0"
                  value="0"
                />
              </div>

              <div class="add-product-form__group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                  <label class="add-product-form__label" style="margin-bottom: 0;">Material</label>
                  <button type="button" class="add-meta-btn" data-type="material" style="background:none; border:none; color:#7c3aed; cursor:pointer; display:flex; align-items:center; gap:4px; font-size:12px; font-weight:600;">
                    <i data-lucide="plus-circle" style="width:14px; height:14px;"></i> Add
                  </button>
                </div>
                <select class="add-product-form__select add-product-form__material-select">
                  <option value="">— Select Material —</option>
                </select>
              </div>
            </div>

            <div class="add-product-form__group">
              <label class="add-product-form__label">Product Status</label>
              <select class="add-product-form__select add-product-form__status-select">
                <option value="Active">Active</option>
                <option value="Draft">Draft</option>
                <option value="Retired">Retired</option>
              </select>
            </div>

            <div class="add-product-form__group">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <label class="add-product-form__label" style="margin-bottom: 0;">Colors</label>
                <button type="button" class="add-meta-btn" data-type="color" style="background:none; border:none; color:#7c3aed; cursor:pointer; display:flex; align-items:center; gap:4px; font-size:12px; font-weight:600;">
                  <i data-lucide="plus-circle" style="width:14px; height:14px;"></i> Add New Color
                </button>
              </div>
              <div class="add-product-form__color-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; max-height: 300px; overflow-y: auto; overflow-x: hidden; border: 1px solid #ddd; padding: 12px; border-radius: 4px; background-color: #fafafa; min-height: 80px;">
                <p style="grid-column: 1/-1; color: #999; text-align: center; padding: 20px 0; margin: 0;">Loading colors...</p>
              </div>
            </div>

            <div style="border: 1px solid #ddd; padding: 20px; border-radius: 4px; background-color: #fafafa; margin: 20px 0;">
              <label style="font-weight: 600; font-size: 14px; color: #333; margin-bottom: 15px; display: block;">Dimensions</label>
              
              <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;">
                <div>
                  <label style="font-size: 12px; color: #666; margin-bottom: 5px; display: block;">Length (cm)</label>
                  <input type="number" placeholder="50" class="add-product-dimension-card__input" step="0.01" />
                </div>
                <div>
                  <label style="font-size: 12px; color: #666; margin-bottom: 5px; display: block;">Width (cm)</label>
                  <input type="number" placeholder="50" class="add-product-dimension-card__input" step="0.01" />
                </div>
                <div>
                  <label style="font-size: 12px; color: #666; margin-bottom: 5px; display: block;">Height (cm)</label>
                  <input type="number" placeholder="50" class="add-product-dimension-card__input" step="0.01" />
                </div>
                <div>
                  <label style="font-size: 12px; color: #666; margin-bottom: 5px; display: block;">Weight (kg)</label>
                  <input type="number" placeholder="80" class="add-product-dimension-card__input" step="0.01" />
                </div>
              </div>
            </div>

            <div class="add-product-form__group">
              <label class="add-product-form__label">Product Images</label>
              <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input
                  type="text"
                  id="image-url-input"
                  placeholder="https://example.com/image.jpg"
                  class="add-product-form__input"
                  style="flex: 1;"
                />
                <button type="button" id="add-image-btn" class="add-product-form__action-button add-product-form__action-button--primary" style="padding: 10px 15px; white-space: nowrap;">
                  Add Image
                </button>
              </div>
              <div id="images-list" style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px;">
                <!-- Images added here -->
              </div>
            </div>

            <div class="add-product-form__group">
              <label class="add-product-form__label">Details</label>
              <textarea class="add-product-form__textarea add-product-form__textarea--small"></textarea>
            </div>

            <div class="add-product-form__group">
              <label class="add-product-form__label">Description</label>
              <textarea class="add-product-form__textarea add-product-form__textarea--large"></textarea>
            </div>

            <div class="add-product-form__feature-toggle">
              <div class="add-product-form__toggle-track">
                <div class="add-product-form__toggle-thumb"></div>
              </div>
              <span class="add-product-form__toggle-label">Featured Product</span>
            </div>

            <div class="add-product-form__action-grid">
              <button type="button" id="btn-add-product" class="add-product-form__action-button add-product-form__action-button--primary">
                Add Product
              </button>
              <button type="button" id="btn-save-draft" class="add-product-form__action-button add-product-form__action-button--secondary">
                Save Draft
              </button>
              <button type="button" id="btn-update-product" class="add-product-form__action-button add-product-form__action-button--update" style="display:none;">
                Update Product
              </button>
            </div>
          </form>
        </section>

        <!-- Preview section -->
        <section class="add-product-preview">
          <h2 class="add-product-preview__title">Product Preview</h2>

          <div class="add-product-preview__grid">
            <div class="add-product-preview__hero-image-wrap">
              <img
                src="https://placehold.co/600x400/eae3db/999?text=Main+Image"
                alt="Preview Hero"
                class="add-product-preview__image"
              />
            </div>

            <div class="add-product-preview__square-image-wrap">
              <img
                src="https://placehold.co/400x400/eae3db/999?text=Image+1"
                alt="Preview 1"
                class="add-product-preview__image"
              />
            </div>

            <div class="add-product-preview__square-image-wrap">
              <img
                src="https://placehold.co/400x400/eae3db/999?text=Image+2"
                alt="Preview 2"
                class="add-product-preview__image"
              />
            </div>

            <div class="add-product-preview__portrait-image-wrap">
              <img
                src="https://placehold.co/400x600/eae3db/999?text=Image+3"
                alt="Preview 3"
                class="add-product-preview__image"
              />
            </div>

            <div class="add-product-preview__stack">
              <div class="add-product-preview__stack-top">
                <img
                  src="https://placehold.co/400x200/eae3db/999?text=Image+4"
                  alt="Preview 4"
                  class="add-product-preview__image"
                />
              </div>

              <div class="add-product-preview__stack-bottom">
                <img
                  src="https://placehold.co/400x200/eae3db/999?text=Image+5"
                  alt="Preview 5"
                  class="add-product-preview__image"
                />
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <!-- Meta Management Modal -->
  <div id="metaModal" class="admin-panel-modal is-hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; align-items: center; justify-content: center;">
    <div class="admin-panel-modal__backdrop" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);"></div>
    <div class="admin-panel-modal__content" style="position: relative; background: white; width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);">
      <h2 id="metaModalTitle" class="admin-panel-modal__title" style="margin-bottom: 20px; font-size: 20px;">Add New</h2>
      
      <div id="metaModalInputs">
        <!-- Dynamic inputs here -->
      </div>

      <div class="admin-panel-modal__actions" style="display: flex; gap: 12px; margin-top: 25px;">
        <button type="button" id="metaModalSubmit" class="add-product-form__action-button add-product-form__action-button--primary" style="flex: 1;">Create</button>
        <button type="button" id="metaModalCancel" class="add-product-form__action-button add-product-form__action-button--secondary" style="flex: 1;">Cancel</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
