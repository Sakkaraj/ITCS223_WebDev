<!--
  sign-in.html — BoonSonClon Authentication Gateway
  Purpose: Secure entry point for registered users, featuring a high-impact 
           visual layout and integrated form validation via auth.js.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Furniture Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/sign-in.css" />
    <link rel="stylesheet" href="../assets/css/footer.css" />
    <link rel="stylesheet" href="../assets/css/header.css" />
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="signin-page">
        <section class="signin-card">
            <div class="signin-card__media">
                <img
                    src="../assets/images/best-seller/img4.avif"
                    alt="Furniture background"
                    class="signin-card__image"
                />
                <div class="signin-card__overlay">
                    <h2 class="signin-card__overlay-title">Furniture</h2>
                    <p class="signin-card__overlay-text">
                        Join our community of furniture enthusiasts and stay updated with latest trends.
                    </p>
                </div>
            </div>

            <div class="signin-card__content">
                <div class="signin-card__header">
                    <p class="signin-card__eyebrow">Welcome back</p>
                    <h1 class="signin-card__title">Sign in to your account</h1>
                </div>

                <form class="signin-form">
                    <div class="signin-form__group">
                        <label for="email" class="signin-form__label">Email</label>
                        <input
                            id="email"
                            type="email"
                            placeholder="Enter your email"
                            class="signin-form__input"
                        />
                    </div>

                    <div class="signin-form__group">
                        <label for="password" class="signin-form__label">Password</label>
                        <input
                            id="password"
                            type="password"
                            placeholder="••••••••"
                            class="signin-form__input"
                        />
                    </div>

                    <button type="submit" class="signin-form__button">
                        Log In
                    </button>
                </form>

                <p class="signin-card__signup-text">
                    <a href="#" class="signin-card__signup-link">Sign Up</a>
                    here if you do not have an account
                </p>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../assets/js/layout.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
