<!--
  advance-search.html — BoonSonClon Advanced Product Search
  Purpose: Sophisticated filtering interface for users to find furniture 
           based on physical dimensions, price range, materials, and colors.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Search | Furniture Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/advance-search.css" />
    <link rel="stylesheet" href="../assets/css/footer.css" />
    <link rel="stylesheet" href="../assets/css/header.css" />
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="advanced-search-hero">
        <img
            src="../assets/images/table.avif"
            alt="Advanced Search Banner"
            class="advanced-search-hero__image"
        />
        <div class="advanced-search-hero__overlay"></div>
        <h1 class="advanced-search-hero__title">Advanced Search</h1>
    </section>

    <main class="advanced-search-page">
        <div class="page-container">
            <div class="advanced-search-page__layout">
                <!-- Search panel -->
                <aside class="advanced-search-panel">
                    <div class="advanced-search-panel__group">
                        <label class="advanced-search-panel__label">Category</label>
                        <select class="advanced-search-panel__select" id="as-category">
                            <option value="">All Categories</option>
                        </select>
                    </div>

                    <div class="advanced-search-panel__group">
                        <label class="advanced-search-panel__label">Max Price ($)</label>
                        <input
                            id="as-price"
                            type="number"
                            placeholder="e.g. 500"
                            class="advanced-search-panel__input"
                        />
                    </div>

                    <div class="advanced-search-panel__group">
                        <label class="advanced-search-panel__label">Material</label>
                        <select class="advanced-search-panel__select" id="as-material">
                            <option value="">All Materials</option>
                        </select>
                    </div>

                    <div class="advanced-search-panel__group">
                        <label class="advanced-search-panel__label">Color Palette</label>
                        <div class="advanced-search-panel__color-grid" id="as-color-palette" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px;">
                            <!-- Color swatches will be loaded here -->
                        </div>
                        <input type="hidden" id="as-color" value="" />
                    </div>

                    <div class="advanced-search-panel__group">
                        <label class="advanced-search-panel__label">Sort By</label>
                        <select class="advanced-search-panel__select" id="as-sort">
                            <option value="latest">Sort by latest</option>
                            <option value="bestsellers">Best Sellers</option>
                            <option value="price_asc">Price: Low to High</option>
                            <option value="price_desc">Price: High to Low</option>
                        </select>
                    </div>

                    <div class="advanced-search-panel__dimension-grid">
                        <div class="advanced-search-panel__dimension-field">
                            <label class="advanced-search-panel__mini-label">Width (max cm)</label>
                            <div class="advanced-search-panel__unit-input">
                                <input type="number" id="as-width" class="advanced-search-panel__unit-input-field" placeholder="0" />
                                <span class="advanced-search-panel__unit-label">cm</span>
                            </div>
                        </div>

                        <div class="advanced-search-panel__dimension-field">
                            <label class="advanced-search-panel__mini-label">Length (max cm)</label>
                            <div class="advanced-search-panel__unit-input">
                                <input type="number" id="as-length" class="advanced-search-panel__unit-input-field" placeholder="0" />
                                <span class="advanced-search-panel__unit-label">cm</span>
                            </div>
                        </div>

                        <div class="advanced-search-panel__dimension-field">
                            <label class="advanced-search-panel__mini-label">Height (max cm)</label>
                            <div class="advanced-search-panel__unit-input">
                                <input type="number" id="as-height" class="advanced-search-panel__unit-input-field" placeholder="0" />
                                <span class="advanced-search-panel__unit-label">cm</span>
                            </div>
                        </div>

                        <div class="advanced-search-panel__dimension-field">
                            <label class="advanced-search-panel__mini-label">Weight (max kg)</label>
                            <div class="advanced-search-panel__unit-input">
                                <input type="number" id="as-weight" class="advanced-search-panel__unit-input-field" placeholder="0" />
                                <span class="advanced-search-panel__unit-label">Kg</span>
                            </div>
                        </div>
                    </div>

                    <div class="advanced-search-panel__checkbox-row">
                        <input type="checkbox" id="featured" class="advanced-search-panel__checkbox" />
                        <label for="featured" class="advanced-search-panel__checkbox-label">
                            Featured Product
                        </label>
                    </div>

                    <div class="advanced-search-panel__actions">
                        <button id="as-search-btn" class="advanced-search-panel__button advanced-search-panel__button--primary">
                            Search
                        </button>
                        <button id="as-clear-btn" class="advanced-search-panel__button advanced-search-panel__button--secondary">
                            Clear
                        </button>
                    </div>
                </aside>

                <!-- Preview results -->
                <section class="advanced-search-results">
                    <div class="advanced-search-results__header">
                        <h2 class="advanced-search-results__title">
                            Search Product <br />
                            Preview
                        </h2>
                        <span id="loading-spinner" class="advanced-search-results__spinner"></span>
                    </div>

                    <div class="advanced-search-results__grid">
                        <article class="advanced-search-result-card">
                            <img
                                src="../assets/images/table.avif"
                                alt="Coffee Table"
                                class="advanced-search-result-card__image"
                            />
                            <h3 class="advanced-search-result-card__title">Coffee Table</h3>
                            <p class="advanced-search-result-card__price">$150</p>
                            <div class="advanced-search-result-card__swatches">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                        </article>

                        <article class="advanced-search-skeleton-card">
                            <div class="advanced-search-skeleton-card__image skeleton"></div>
                            <div class="advanced-search-skeleton-card__title skeleton"></div>
                            <div class="advanced-search-skeleton-card__price skeleton"></div>
                        </article>

                        <article class="advanced-search-skeleton-card">
                            <div class="advanced-search-skeleton-card__image skeleton"></div>
                            <div class="advanced-search-skeleton-card__title skeleton"></div>
                            <div class="advanced-search-skeleton-card__price skeleton"></div>
                        </article>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/layout.js"></script>
    <script>
        lucide.createIcons();

        // ── Populate sidebars from API ──────────────────
        (async () => {
            try {
                // Categories
                const cats = await BSC.apiFetch('/api/products/meta/categories');
                const catSel = document.getElementById('as-category');
                if (catSel && Array.isArray(cats)) {
                    cats.forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = c.Category;
                        opt.textContent = `${c.Category} (${c.ProductCount})`;
                        catSel.appendChild(opt);
                    });
                }
                
                // Materials
                const mats = await BSC.apiFetch('/api/products/meta/materials');
                const matSel = document.getElementById('as-material');
                if (matSel && Array.isArray(mats)) {
                    mats.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m.MaterialId;
                        opt.textContent = m.MaterialName;
                        matSel.appendChild(opt);
                    });
                }

                // Colors
                const cols = await BSC.apiFetch('/api/products/meta/colors');
                const palette = document.getElementById('as-color-palette');
                const hiddenInput = document.getElementById('as-color');
                if (palette && Array.isArray(cols)) {
                    palette.innerHTML = cols.map(c => `
                        <div class="advanced-search-color-swatch tooltip-trigger" 
                             data-id="${c.ColorId}" 
                             style="background-color:${c.HexCode || '#ccc'}; width:22px; height:22px; border-radius:3px; border:1px solid #e5e7eb; cursor:pointer;"
                             title="${c.ColorName}">
                        </div>
                    `).join('');

                    palette.querySelectorAll('.advanced-search-color-swatch').forEach(swatch => {
                        swatch.addEventListener('click', () => {
                            // Deselect if already selected
                            if (hiddenInput.value === swatch.dataset.id) {
                                hiddenInput.value = '';
                                swatch.style.border = '1px solid #e5e7eb';
                                swatch.style.transform = 'scale(1)';
                                swatch.style.boxShadow = 'none';
                            } else {
                                // Select new color
                                palette.querySelectorAll('.advanced-search-color-swatch').forEach(s => {
                                    s.style.border = '1px solid #e5e7eb';
                                    s.style.transform = 'scale(1)';
                                    s.style.boxShadow = 'none';
                                });
                                hiddenInput.value = swatch.dataset.id;
                                swatch.style.border = '2px solid #a6866a';
                                swatch.style.transform = 'scale(1.15)';
                                swatch.style.boxShadow = '0 2px 4px rgba(166,134,106,0.3)';
                            }
                        });
                    });
                }
            } catch (e) { console.error("Failed to load metadata", e); }
        })();

        // ── Search button ────────────────────────────────────────
        document.getElementById('as-search-btn')?.addEventListener('click', async () => {
            const category = document.getElementById('as-category')?.value || '';
            const maxPrice = document.getElementById('as-price')?.value || '';
            const materialId = document.getElementById('as-material')?.value || '';
            const colorId = document.getElementById('as-color')?.value || '';
            const featured = document.getElementById('featured')?.checked || false;
            
            const width = document.getElementById('as-width')?.value || '';
            const length = document.getElementById('as-length')?.value || '';
            const height = document.getElementById('as-height')?.value || '';
            const weight = document.getElementById('as-weight')?.value || '';
            const sort = document.getElementById('as-sort')?.value || 'latest';

            const params = new URLSearchParams({ limit: 12, sort });
            if (category) params.set('category', category);
            if (maxPrice) params.set('maxPrice', maxPrice);
            if (materialId) params.set('materialId', materialId);
            if (colorId) params.set('colorId', colorId);
            if (featured) params.set('featured', '1');
            
            if (width) params.set('maxWidth', width);
            if (length) params.set('maxLength', length);
            if (height) params.set('maxHeight', height);
            if (weight) params.set('maxWeight', weight);

            const grid = document.querySelector('.advanced-search-results__grid');
            const spinner = document.getElementById('loading-spinner');
            if (!grid) return;

            if (spinner) spinner.style.display = 'inline-block';
            grid.innerHTML = '<p style="text-align:center;padding:40px;color:#888;">Searching…</p>';

            try {
                const data = await BSC.apiFetch(`/api/products?${params}`);
                const products = data.products || [];

                if (products.length === 0) {
                    grid.innerHTML = '<p style="text-align:center;padding:60px;color:#888;">No products found. Try different filters.</p>';
                    return;
                }

                grid.innerHTML = products.map(p => {
                    let img = p.ImageUrl || '../assets/images/chair.avif';
                    if (img.startsWith('assets/')) img = '../' + img;

                    return `
                        <article class="advanced-search-result-card" style="cursor:pointer;"
                            onclick="window.location.href='../pages/product?id=${p.ProductId}'">
                            <div class="advanced-search-result-card__img-wrap">
                                <img src="${img}" alt="${p.ProductName}"
                                         class="advanced-search-result-card__image"
                                         onerror="this.src='../assets/images/chair.avif'" />
                            </div>
                            <h3 class="advanced-search-result-card__title" style="margin-top:10px;">${p.ProductName}</h3>
                            <p class="advanced-search-result-card__price">$${parseFloat(p.Price).toFixed(2)}</p>
                            
                            ${p.colors && p.colors.length ? `
                            <div class="advanced-search-result-card__swatches">
                                ${p.colors.slice(0, 4).map(c => `
                                    <span style="background-color: ${c.HexCode || '#ccc'}"></span>
                                `).join('')}
                            </div>` : ''}

                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
                                <span style="font-size:11px;color:#888;text-transform:uppercase;">${p.Category}</span>
                                <span style="font-size:11px;color:#a6866a;font-weight:600;">${p.MaterialName || ''}</span>
                            </div>
                        </article>
                    `;
                }).join('');
            } catch (err) {
                grid.innerHTML = `<p style="text-align:center;padding:40px;color:#e44;">Search failed: ${err.message}</p>`;
            } finally {
                if (spinner) spinner.style.display = 'none';
            }
        });

        // ── Clear button ─────────────────────────────────────────
        document.getElementById('as-clear-btn')?.addEventListener('click', () => {
            document.getElementById('as-category').value = '';
            document.getElementById('as-price').value = '';
            document.getElementById('as-material').value = '';
            document.getElementById('as-color').value = '';
            document.getElementById('as-sort').value = 'latest';
            document.getElementById('featured').checked = false;
            document.getElementById('as-width').value = '';
            document.getElementById('as-length').value = '';
            document.getElementById('as-height').value = '';
            document.getElementById('as-weight').value = '';
            
            // Reset color palette visuals
            const palette = document.getElementById('as-color-palette');
            if (palette) {
                palette.querySelectorAll('.advanced-search-color-swatch').forEach(swatch => {
                    swatch.style.border = '1px solid #e5e7eb';
                    swatch.style.transform = 'scale(1)';
                    swatch.style.boxShadow = 'none';
                });
            }

            // Auto-trigger clean search
            document.getElementById('as-search-btn')?.click();
        });

        // ── Pre-fill from URL and Auto-Run ──────────────────────
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('category')) {
                document.getElementById('as-category').value = urlParams.get('category');
            }
            setTimeout(() => {
                document.getElementById('as-search-btn')?.click();
            }, 500); // Wait for options to populate
        });
    </script>
</body>
</html>
  </script>
</body>
</html>
